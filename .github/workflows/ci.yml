name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  run-all:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build qt6-base-dev

      - name: Install Windows desktop dependencies (Qt)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          arch: 'win64_msvc2019_64'

      - name: Run unified CI entrypoint (Linux/macOS)
        if: runner.os != 'Windows'
        run: bash scripts/ci/run_all.sh

      - name: Run unified CI entrypoint (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/ci/run_all.ps1

      - name: Upload CI logs and failure artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ matrix.os }}
          path: |
            .ci_logs/
            build/ci_artifacts/**
          if-no-files-found: warn
