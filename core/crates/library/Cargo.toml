[package]
name = "craftcad_library"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
regex = "1"
sha2 = "0.10"
hex = "0.4"
parking_lot = "0.12"
tempfile = "3"
jsonschema = "0.18"
url = "2"
unicode-normalization = "0.1"
craftcad_presets = { path = "../presets" }
semver = "1"

[dev-dependencies]
once_cell = "1"
